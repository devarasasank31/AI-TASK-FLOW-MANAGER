{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="fw-bold mb-4 text-center">Create Account</h3>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                           class="form-control" {% if field.field.required %}required{% endif %}>
                    {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                    {% if field.help_text %}<div class="text-muted small">{{ field.help_text }}</div>{% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-ai w-100">Register</button>
            </form>
            <p class="text-center mt-3 mb-0">Have an account? <a href="{% url 'login' %}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
