<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow AI Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #1e3a5f, #2d6a9f); }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; color: #fff !important; }
        .nav-link { color: rgba(255,255,255,0.85) !important; }
        .nav-link:hover { color: #fff !important; }
        .ai-badge { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; vertical-align: middle; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .btn-ai { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; border: none; }
        .btn-ai:hover { background: linear-gradient(135deg, #6d28d9, #9333ea); color: white; }
        .priority-high { color: #dc2626; font-weight: 600; }
        .priority-medium { color: #d97706; font-weight: 600; }
        .priority-low { color: #16a34a; font-weight: 600; }
        .status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; }
        .ai-spinner { display: none; }
        .ai-glow { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="bi bi-check2-square me-2"></i>TaskFlow <span class="ai-badge">AI</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            {% if user.is_authenticated %}
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}"><i class="bi bi-grid me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'add_task' %}"><i class="bi bi-plus-circle me-1"></i>Add Task</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'analytics' %}"><i class="bi bi-bar-chart me-1"></i>Analytics</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'chatbot' %}"><i class="bi bi-robot me-1"></i>AI Chat</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
            </ul>
            {% else %}
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'register' %}">Register</a></li>
            </ul>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
