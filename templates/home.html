{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-8 text-center">
        <div class="card p-5">
            <h1 class="fw-bold mb-2" style="font-size:2.8rem; color:#1e3a5f;">
                TaskFlow <span style="background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">AI</span>
            </h1>
            <p class="lead text-muted mb-4">Organize. Prioritize. Get Things Done — Powered by AI</p>
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card bg-light p-3">
                        <i class="bi bi-magic fs-3 text-purple" style="color:#7c3aed"></i>
                        <p class="mt-2 mb-0 fw-semibold">AI Description</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-light p-3">
                        <i class="bi bi-chat-dots fs-3" style="color:#7c3aed"></i>
                        <p class="mt-2 mb-0 fw-semibold">NLP Task Input</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-light p-3">
                        <i class="bi bi-lightbulb fs-3" style="color:#7c3aed"></i>
                        <p class="mt-2 mb-0 fw-semibold">Smart Insights</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-light p-3">
                        <i class="bi bi-robot fs-3" style="color:#7c3aed"></i>
                        <p class="mt-2 mb-0 fw-semibold">AI Chatbot</p>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-3 justify-content-center">
                <a href="{% url 'register' %}" class="btn btn-ai btn-lg px-5">Get Started</a>
                <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-lg px-5">Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
